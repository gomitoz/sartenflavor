<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edición de Pedidos | Mesa de Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-search { background-color: #2b6cb0; color: white; }
        .btn-update { background-color: #38a169; color: white; width: 100%; margin-top: 20px; font-size: 16px; }
        .btn-update:hover { background-color: #2f855a; }
        #form-edicion { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .status-msg { margin-top: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>Mesa de Control: Editar Pedido</h2>
    
    <div class="search-box">
        <input type="text" id="search-id" placeholder="Ingresa el UUID del pedido...">
        <button class="btn-search" onclick="buscarPedido()">Buscar Pedido</button>
    </div>
    <div id="search-status" class="status-msg"></div>

    <div id="form-edicion">
        <div class="form-grid">
            <div><label>ID (Lectura):</label><input type="text" id="id" readonly style="background-color: #e2e8f0;"></div>
            <div><label>Destinatario:</label><input type="text" id="destinatario"></div>
            <div><label>Calle y Número:</label><input type="text" id="calle_y_numero"></div>
            <div><label>Colonia:</label><input type="text" id="colonia"></div>
            <div><label>Municipio:</label><input type="text" id="municipio"></div>
            <div><label>Estado:</label><input type="text" id="estado"></div>
            <div><label>Código Postal (CP):</label><input type="text" id="cp"></div>
            <div><label>Teléfono:</label><input type="text" id="telefono"></div>
            <div><label>Producto:</label><input type="text" id="producto"></div>
            
            <div class="full-width"><label>Referencias:</label><textarea id="referencias" rows="2"></textarea></div>
            <div class="full-width"><label>Mensaje Original:</label><textarea id="mensaje_original" rows="3"></textarea></div>
            
            <div><label>Costo Producto:</label><input type="number" step="0.01" id="costo_producto"></div>
            <div><label>Costo Envío:</label><input type="number" step="0.01" id="costo_envio"></div>
            <div><label>Baja Lógica (0 o 1):</label><input type="number" id="bajalogica"></div>
            <div><label>Estatus Proceso:</label><input type="text" id="estatus_proceso" disabled title="Se actualizará a CORREGIDO al guardar"></div>
        </div>

        <button class="btn-update" onclick="actualizarPedido()">Actualizar Pedido</button>
        <div id="update-status" class="status-msg"></div>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN DE SUPABASE
    const SUPABASE_URL = 'https://vtjosswxbkuklwfygvcn.supabase.co'; // Reemplaza con tu URL
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0am9zc3d4Ymt1a2x3ZnlndmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODI4MTgsImV4cCI6MjA4OTg1ODgxOH0.K0gzcDf7figLjgQ3bWO2hgGS9K8yrb1_qxquGypUzOU'; // Reemplaza con tu llave Anon

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. FUNCIÓN DE BÚSQUEDA
    async function buscarPedido() {
        const idBusqueda = document.getElementById('search-id').value.trim();
        const statusMsg = document.getElementById('search-status');
        const formDiv = document.getElementById('form-edicion');

        if (!idBusqueda) {
            statusMsg.style.color = 'red';
            statusMsg.textContent = 'Por favor ingresa un ID válido.';
            return;
        }

        statusMsg.style.color = '#2b6cb0';
        statusMsg.textContent = 'Buscando...';

        const { data, error } = await supabase
            .from('pedidos_whatsapp')
            .select('*')
            .eq('id', idBusqueda)
            .single();

        if (error || !data) {
            statusMsg.style.color = 'red';
            statusMsg.textContent = 'No se encontró ningún pedido con ese ID.';
            formDiv.style.display = 'none';
        } else {
            statusMsg.textContent = '';
            formDiv.style.display = 'block';
            
            // Llenar los campos con los datos recuperados
            document.getElementById('id').value = data.id || '';
            document.getElementById('destinatario').value = data.destinatario || '';
            document.getElementById('calle_y_numero').value = data.calle_y_numero || '';
            document.getElementById('colonia').value = data.colonia || '';
            document.getElementById('referencias').value = data.referencias || '';
            document.getElementById('municipio').value = data.municipio || '';
            document.getElementById('estado').value = data.estado || '';
            document.getElementById('cp').value = data.cp || '';
            document.getElementById('telefono').value = data.telefono || '';
            document.getElementById('producto').value = data.producto || '';
            document.getElementById('estatus_proceso').value = data.estatus_proceso || '';
            document.getElementById('mensaje_original').value = data.mensaje_original || '';
            document.getElementById('costo_producto').value = data.costo_producto || 0;
            document.getElementById('costo_envio').value = data.costo_envio || 0;
            document.getElementById('bajalogica').value = data.bajalogica || 0;
        }
    }

    // 3. FUNCIÓN DE ACTUALIZACIÓN
    async function actualizarPedido() {
        const id = document.getElementById('id').value;
        const statusMsg = document.getElementById('update-status');

        statusMsg.style.color = '#2b6cb0';
        statusMsg.textContent = 'Guardando cambios...';

        // Recolectar datos del formulario
        const datosActualizados = {
            destinatario: document.getElementById('destinatario').value,
            calle_y_numero: document.getElementById('calle_y_numero').value,
            colonia: document.getElementById('colonia').value,
            referencias: document.getElementById('referencias').value,
            municipio: document.getElementById('municipio').value,
            estado: document.getElementById('estado').value,
            cp: document.getElementById('cp').value,
            telefono: document.getElementById('telefono').value,
            producto: document.getElementById('producto').value,
            mensaje_original: document.getElementById('mensaje_original').value,
            costo_producto: parseFloat(document.getElementById('costo_producto').value) || 0,
            costo_envio: parseFloat(document.getElementById('costo_envio').value) || 0,
            bajalogica: parseInt(document.getElementById('bajalogica').value) || 0,
            // Regla de negocio solicitada:
            estatus_proceso: 'CORREGIDO' 
        };

        const { error } = await supabase
            .from('pedidos_whatsapp')
            .update(datosActualizados)
            .eq('id', id);

        if (error) {
            statusMsg.style.color = 'red';
            statusMsg.textContent = 'Error al actualizar: ' + error.message;
            console.error(error);
        } else {
            statusMsg.style.color = 'green';
            statusMsg.textContent = '¡Pedido actualizado exitosamente a estatus CORREGIDO!';
            // Refrescar visualmente el campo de estatus en el formulario
            document.getElementById('estatus_proceso').value = 'CORREGIDO';
        }
    }
</script>

</body>
</html>
