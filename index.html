<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Operaciones</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9em; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; margin-bottom: 10px; font-weight: bold; }
        .btn-primary { background-color: #3498db; color: white; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #ecf0f1; color: #2c3e50; }
        .btn-secondary:hover { background-color: #bdc3c7; }
        #statusMessage { text-align: center; margin-top: 15px; font-size: 0.9em; color: #c62828; min-height: 20px; }
        .success { color: #27ae60 !important; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Acceso al Sistema</h2>
    
    <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" placeholder="usuario@correo.com" required>
    </div>
    
    <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button class="btn btn-primary" onclick="iniciarSesion()">Iniciar Sesión</button>
    <button class="btn btn-secondary" onclick="registrarse()">Crear Cuenta</button>

    <div id="statusMessage"></div>
</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE SUPABASE
    // ==========================================
    const SUPABASE_URL = 'https://vtjosswxbkuklwfygvcn.supabase.co'; // Pega tu URL aquí
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0am9zc3d4Ymt1a2x3ZnlndmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODI4MTgsImV4cCI6MjA4OTg1ODgxOH0.K0gzcDf7figLjgQ3bWO2hgGS9K8yrb1_qxquGypUzOU'; // Pega tu llave aquí

    // SOLUCIÓN: Usamos "clienteSupabase" para evitar el bloqueo del navegador
    const clienteSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==========================================
    // FUNCIONES DE AUTENTICACIÓN
    // ==========================================
    async function iniciarSesion() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('statusMessage');

        if (!email || !password) {
            msg.innerText = "Por favor, llena ambos campos.";
            msg.className = "";
            return;
        }

        msg.innerText = "Conectando...";
        msg.className = "";

        // Usamos clienteSupabase
        const { data, error } = await clienteSupabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            // Traducimos el error clásico de credenciales inválidas
            if(error.message === "Invalid login credentials") {
                msg.innerText = "Error: Correo o contraseña incorrectos.";
            } else {
                msg.innerText = "Error: " + error.message;
            }
            msg.className = "";
        } else {
            msg.innerText = "¡Acceso concedido! Redirigiendo...";
            msg.className = "success";
            setTimeout(() => {
                window.location.href = "index.html"; 
            }, 1000);
        }
    }

    async function registrarse() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('statusMessage');

        if (!email || !password) {
            msg.innerText = "Ingresa un correo y contraseña para registrarte.";
            msg.className = "";
            return;
        }

        msg.innerText = "Creando cuenta...";
        msg.className = "";

        // Usamos clienteSupabase
        const { data, error } = await clienteSupabase.auth.signUp({
            email: email,
            password: password,
        });

        if (error) {
            msg.innerText = "Error al registrar: " + error.message;
            msg.className = "";
        } else {
            msg.innerText = "¡Cuenta creada! Ya puedes darle al botón de Iniciar Sesión.";
            msg.className = "success";
        }
    }

    // ==========================================
    // REDIRECCIÓN AUTOMÁTICA
    // ==========================================
    async function revisarSesion() {
        const { data: { session } } = await clienteSupabase.auth.getSession();
        if (session) {
            window.location.href = "index.html";
        }
    }
    revisarSesion();

</script>
</body>
</html>

</body>
</html>
