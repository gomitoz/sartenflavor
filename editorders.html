<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mesa de Control | Pedidos</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0f1e2e;--navy2:#182d42;
      --teal:#0e9f8a;--teal2:#0b7a6a;
      --slate:#334155;--muted:#64748b;
      --border:#dde3ec;--bg:#f3f6fb;
      --white:#ffffff;--text:#1a2332;
      --green:#14a84b;--red:#d93636;
    }
    body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
    header{background:var(--navy);padding:0 28px;height:56px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--teal)}
    header .logo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--teal2);padding:3px 10px;border-radius:4px}
    header h1{font-size:15px;font-weight:500;color:#e2eaf4}
    main{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
    .card{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:18px;overflow:hidden}
    .card-head{background:var(--navy2);color:#c8d8e8;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:9px 18px;display:flex;align-items:center;gap:8px}
    .card-body{padding:18px}
    .tabs{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:fit-content;margin-bottom:16px}
    .tab{padding:7px 18px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:background .15s,color .15s}
    .tab:not(:last-child){border-right:1px solid var(--border)}
    .tab.on{background:var(--navy);color:#e2eaf4}
    .row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
    .fld{display:flex;flex-direction:column;gap:4px}
    .fld label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    input,textarea,select{border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--text);background:var(--white);outline:none}
    input[type=datetime-local]{font-family:'IBM Plex Mono',monospace;font-size:12px}
    input:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,159,138,.12)}
    input[readonly]{background:#f0f4f9;color:var(--muted)}
    .btn{padding:8px 16px;border:none;border-radius:5px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
    .btn-teal{background:var(--teal);color:#fff}
    .btn-teal:hover{background:var(--teal2)}
    .btn-hoy{background:#e8f8f5;color:var(--teal2);border:1px solid #a8e6dc;font-size:11px;font-weight:600}
    .btn-save{background:var(--green);color:#fff;width:100%;margin-top:16px;justify-content:center;padding:11px;font-size:14px}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--slate)}
    .msg{font-size:12px;font-weight:500;margin-top:6px;min-height:16px}
    .msg.ok{color:var(--green)}.msg.err{color:var(--red)}.msg.inf{color:var(--teal2)}
    /* tabla */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:#f6f9fd;border-bottom:1px solid var(--border)}
    th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
    tbody tr{border-bottom:1px solid #f0f3f8;cursor:pointer}
    tbody tr:hover{background:#f0f9f7}
    tbody tr.sel{background:#dff5f0}
    td{padding:10px 12px;color:var(--slate);vertical-align:middle}
    td.mono{font-family:'IBM Plex Mono',monospace;font-size:11px}
    .chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase}
    .c-pend{background:#fff3e0;color:#b35c00}.c-err{background:#fde8e8;color:#a82020}
    .c-ok{background:#e2f5ea;color:#116b2e}.c-corr{background:#e4f0ff;color:#1752a8}
    .c-def{background:#f0f4f9;color:#64748b}
    .c-baja{background:#fde8e8;color:#a82020}.c-act{background:#e2f5ea;color:#116b2e}
    /* form edicion */
    .fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .s2{grid-column:span 2}.s3{grid-column:span 3}
    .ff{display:flex;flex-direction:column;gap:4px}
    .ff label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .ff input,.ff textarea{width:100%}
    .ff textarea{resize:vertical;min-height:60px}
    .hint{font-size:11px;color:var(--teal2);font-family:'IBM Plex Mono',monospace;margin-bottom:14px;padding:8px 12px;background:#f0faf8;border-left:3px solid var(--teal);border-radius:0 5px 5px 0}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#e8f8f5;color:var(--teal2)}
    [hidden]{display:none!important}
  </style>
</head>
<body>
<header>
  <div class="logo">Mesa de Control</div>
  <h1>Gestión de Pedidos</h1>
</header>
<main>

  <!-- FILTROS -->
  <div class="card">
    <div class="card-head">Filtros de búsqueda</div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab on" id="t-fecha" onclick="switchTab('fecha')">Por fecha</button>
        <button class="tab"    id="t-uuid"  onclick="switchTab('uuid')">Por ID / UUID</button>
      </div>

      <div id="p-fecha">
        <div class="row">
          <div class="fld">
            <label>Desde</label>
            <input type="datetime-local" id="desde" style="width:210px">
          </div>
          <div class="fld">
            <label>Hasta</label>
            <input type="datetime-local" id="hasta" style="width:210px">
          </div>
          <div class="fld">
            <label>&nbsp;</label>
            <button class="btn btn-hoy" onclick="setHoy()">📅 Hoy</button>
          </div>
          <div class="fld" style="margin-left:auto">
            <label>&nbsp;</label>
            <button class="btn btn-teal" onclick="buscarFecha()">🔍 Buscar</button>
          </div>
        </div>
        <div class="msg" id="msg-fecha"></div>
      </div>

      <div id="p-uuid" hidden>
        <div class="row">
          <div class="fld" style="flex:1">
            <label>UUID del pedido</label>
            <input type="text" id="uuid-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
              style="font-family:'IBM Plex Mono',monospace;font-size:12px">
          </div>
          <div class="fld">
            <label>&nbsp;</label>
            <button class="btn btn-teal" onclick="buscarUUID()">🔍 Buscar</button>
          </div>
        </div>
        <div class="msg" id="msg-uuid"></div>
      </div>
    </div>
  </div>

  <!-- RESULTADOS -->
  <div class="card" id="sec-resultados" hidden>
    <div class="card-head">
      Resultados &nbsp;<span class="badge" id="cnt">0</span>
      <span style="flex:1"></span>
      <span style="font-size:10px;opacity:.6">Haz clic en una fila para editar</span>
    </div>
    <div class="card-body" style="padding:0">
      <div class="tbl-wrap" id="tbl-container"></div>
    </div>
  </div>

  <!-- EDICIÓN -->
  <div class="card" id="sec-edicion" hidden>
    <div class="card-head">Editar pedido</div>
    <div class="card-body">
      <div class="hint" id="edit-hint">— selecciona una fila —</div>
      <div class="fgrid">
        <div class="ff"><label>ID (solo lectura)</label><input type="text" id="e-id" readonly></div>
        <div class="ff"><label>Fecha captura</label><input type="datetime-local" id="e-fecha" style="font-family:'IBM Plex Mono',monospace;font-size:12px"></div>
        <div class="ff"><label>Estatus proceso</label><input type="text" id="e-estatus" readonly title="Se actualiza al guardar"></div>

        <div class="ff"><label>Destinatario</label><input type="text" id="e-destinatario"></div>
        <div class="ff"><label>Teléfono</label><input type="text" id="e-telefono"></div>
        <div class="ff"><label>Producto</label><input type="text" id="e-producto"></div>

        <div class="ff s2"><label>Calle y número</label><input type="text" id="e-calle"></div>
        <div class="ff"><label>Colonia</label><input type="text" id="e-colonia"></div>

        <div class="ff"><label>Municipio</label><input type="text" id="e-municipio"></div>
        <div class="ff"><label>Estado</label><input type="text" id="e-estado"></div>
        <div class="ff"><label>Código postal</label><input type="text" id="e-cp"></div>

        <div class="ff"><label>Costo producto</label><input type="number" step="0.01" id="e-costo_prod"></div>
        <div class="ff"><label>Costo envío</label><input type="number" step="0.01" id="e-costo_env"></div>
        <div class="ff"><label>Baja lógica (0=activo / 1=baja)</label><input type="number" min="0" max="1" id="e-baja"></div>

        <div class="ff s3"><label>Referencias</label><textarea id="e-referencias" rows="2"></textarea></div>
        <div class="ff s3"><label>Mensaje original</label><textarea id="e-mensaje" rows="3"></textarea></div>
      </div>

      <button class="btn btn-save" onclick="guardar()">✅ Guardar cambios</button>
      <div class="msg" id="msg-save" style="text-align:center"></div>
    </div>
  </div>

</main>
<script>
const SUPA_URL = 'https://vtjosswxbkuklwfygvcn.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0am9zc3d4Ymt1a2x3ZnlndmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODI4MTgsImV4cCI6MjA4OTg1ODgxOH0.K0gzcDf7figLjgQ3bWO2hgGS9K8yrb1_qxquGypUzOU'; // ← tu Anon key aquí

const db = supabase.createClient(SUPA_URL, SUPA_KEY);
let rows = [];
let selId = null;

/* ── utils ── */
function pad(n){ return String(n).padStart(2,'0'); }

function toISO(local){
  if(!local) return null;
  return new Date(local).toISOString();
}
function toLocal(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmt(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function esc(v){
  return String(v||'—').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function show(id){ document.getElementById(id).removeAttribute('hidden'); }
function hide(id){ document.getElementById(id).setAttribute('hidden',''); }
function msg(id, text, cls){
  const el = document.getElementById(id);
  el.className = 'msg ' + cls;
  el.textContent = text;
}

/* ── tabs ── */
function switchTab(t){
  if(t==='fecha'){
    show('p-fecha'); hide('p-uuid');
    document.getElementById('t-fecha').classList.add('on');
    document.getElementById('t-uuid').classList.remove('on');
  } else {
    hide('p-fecha'); show('p-uuid');
    document.getElementById('t-uuid').classList.add('on');
    document.getElementById('t-fecha').classList.remove('on');
  }
}

/* ── hoy ── */
function setHoy(){
  const hoy = new Date();
  const s = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), 0, 0, 0);
  const e = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate(), 23, 59, 59);
  document.getElementById('desde').value = toLocal(s.toISOString());
  document.getElementById('hasta').value = toLocal(e.toISOString());
}

/* ── buscar por fecha ── */
async function buscarFecha(){
  const desde = document.getElementById('desde').value;
  const hasta = document.getElementById('hasta').value;
  if(!desde||!hasta){ msg('msg-fecha','Selecciona ambas fechas.','err'); return; }

  msg('msg-fecha','Buscando…','inf');

  try {
    const { data, error } = await db
      .from('pedidos_whatsapp')
      .select('*')
      .gte('fecha_captura', toISO(desde))
      .lte('fecha_captura', toISO(hasta))
      .order('fecha_captura', { ascending: false });

    if(error) throw error;

    msg('msg-fecha', data.length ? `${data.length} pedido(s) encontrado(s).` : 'Sin resultados.', data.length ? 'ok' : 'inf');
    renderGrid(data);
  } catch(e){
    msg('msg-fecha','Error: '+e.message,'err');
    console.error(e);
  }
}

/* ── buscar por UUID ── */
async function buscarUUID(){
  const id = document.getElementById('uuid-input').value.trim();
  if(!id){ msg('msg-uuid','Ingresa un ID válido.','err'); return; }

  msg('msg-uuid','Buscando…','inf');
  try {
    const { data, error } = await db
      .from('pedidos_whatsapp')
      .select('*')
      .eq('id', id)
      .single();

    if(error) throw error;
    msg('msg-uuid','Pedido encontrado.','ok');
    renderGrid([data]);
  } catch(e){
    msg('msg-uuid','No encontrado o error: '+e.message,'err');
    renderGrid([]);
  }
}

/* ── render tabla ── */
function renderGrid(data){
  rows  = data;
  selId = null;
  hide('sec-edicion');

  document.getElementById('cnt').textContent = data.length;
  show('sec-resultados');

  const container = document.getElementById('tbl-container');

  if(!data.length){
    container.innerHTML = '<p style="text-align:center;padding:32px;color:#64748b;font-size:13px">Sin resultados para los filtros seleccionados.</p>';
    return;
  }

  const chipMap = {
    'PENDIENTE':'c-pend','ERROR':'c-err','PROCESADO':'c-ok',
    'CORREGIDO':'c-corr','CANCELADO':'c-err'
  };

  const trHtml = data.map(r => {
    const st  = r.estatus_proceso || '';
    const cls = chipMap[st.toUpperCase()] || 'c-def';
    const bjCls = r.bajalogica==1 ? 'c-baja' : 'c-act';
    const bjTxt = r.bajalogica==1 ? 'Baja' : 'Activa';
    return `<tr onclick="selRow('${r.id}')">
      <td class="mono">${fmt(r.fecha_captura)}</td>
      <td>${esc(r.destinatario)}</td>
      <td>${esc(r.producto)}</td>
      <td><span class="chip ${cls}">${esc(st)||'—'}</span></td>
      <td><span class="chip ${bjCls}">${bjTxt}</span></td>
      <td style="text-align:right;font-size:11px;color:var(--teal2);font-weight:600">Editar →</td>
    </tr>`;
  }).join('');

  container.innerHTML = `<table>
    <thead><tr>
      <th>Fecha captura</th><th>Destinatario</th><th>Producto</th>
      <th>Estatus</th><th>Registro</th><th></th>
    </tr></thead>
    <tbody>${trHtml}</tbody>
  </table>`;
}

/* ── seleccionar fila ── */
function selRow(id){
  selId = id;
  document.querySelectorAll('#tbl-container tbody tr').forEach(tr=>{
    tr.classList.toggle('sel', tr.getAttribute('onclick')===`selRow('${id}')`);
  });

  const p = rows.find(r=>r.id===id);
  if(!p) return;

  document.getElementById('edit-hint').textContent = `Editando → ${p.id} · ${fmt(p.fecha_captura)}`;

  document.getElementById('e-id').value         = p.id||'';
  document.getElementById('e-fecha').value      = toLocal(p.fecha_captura);
  document.getElementById('e-estatus').value    = p.estatus_proceso||'';
  document.getElementById('e-destinatario').value = p.destinatario||'';
  document.getElementById('e-telefono').value   = p.telefono||'';
  document.getElementById('e-producto').value   = p.producto||'';
  document.getElementById('e-calle').value      = p.calle_y_numero||'';
  document.getElementById('e-colonia').value    = p.colonia||'';
  document.getElementById('e-municipio').value  = p.municipio||'';
  document.getElementById('e-estado').value     = p.estado||'';
  document.getElementById('e-cp').value         = p.cp||'';
  document.getElementById('e-costo_prod').value = p.costo_producto||0;
  document.getElementById('e-costo_env').value  = p.costo_envio||0;
  document.getElementById('e-baja').value       = p.bajalogica||0;
  document.getElementById('e-referencias').value  = p.referencias||'';
  document.getElementById('e-mensaje').value    = p.mensaje_original||'';

  document.getElementById('msg-save').textContent = '';
  show('sec-edicion');
  document.getElementById('sec-edicion').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ── guardar ── */
async function guardar(){
  const id = document.getElementById('e-id').value;
  if(!id){ msg('msg-save','Sin pedido seleccionado.','err'); return; }

  msg('msg-save','Guardando…','inf');

  const fechaVal = document.getElementById('e-fecha').value;
  const update = {
    destinatario:    document.getElementById('e-destinatario').value,
    telefono:        document.getElementById('e-telefono').value,
    producto:        document.getElementById('e-producto').value,
    calle_y_numero:  document.getElementById('e-calle').value,
    colonia:         document.getElementById('e-colonia').value,
    municipio:       document.getElementById('e-municipio').value,
    estado:          document.getElementById('e-estado').value,
    cp:              document.getElementById('e-cp').value,
    costo_producto:  parseFloat(document.getElementById('e-costo_prod').value)||0,
    costo_envio:     parseFloat(document.getElementById('e-costo_env').value)||0,
    bajalogica:      parseInt(document.getElementById('e-baja').value)||0,
    referencias:     document.getElementById('e-referencias').value,
    mensaje_original:document.getElementById('e-mensaje').value,
    estatus_proceso: 'CORREGIDO',
  };
  if(fechaVal) update.fecha_captura = toISO(fechaVal);

  try {
    const { error } = await db.from('pedidos_whatsapp').update(update).eq('id', id);
    if(error) throw error;

    msg('msg-save','✓ Pedido actualizado correctamente a CORREGIDO.','ok');
    document.getElementById('e-estatus').value = 'CORREGIDO';

    const idx = rows.findIndex(r=>r.id===id);
    if(idx>-1){
      rows[idx] = {...rows[idx], ...update, estatus_proceso:'CORREGIDO'};
      renderGrid(rows);
      selRow(id);
    }
  } catch(e){
    msg('msg-save','Error: '+e.message,'err');
    console.error(e);
  }
}

/* ── init ── */
setHoy();
</script>
</body>
</html>
